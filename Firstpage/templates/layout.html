<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}HelpDesk{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

  {% block styles %}{% endblock %}
</head>

<body class="bg-dark text-light d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid px-4">

      <a class="navbar-brand fw-bold fs-4" href="/">
        HelpDesk
      </a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="btn btn-outline-light btn-sm px-3 rounded-pill" href="/appeals/adminpanel/">
              Admin
            </a>
            <a class="btn btn-outline-light btn-sm px-3 rounded-pill" href="/appeals/logs/">
              Logs
            </a>
          </li>
        </ul>
        <div class="d-flex gap-2">
          {% if user.is_authenticated %}
          <span class="text-secondary small me-2">
            {{ user.username }}
          </span>
          <a class="btn btn-sm btn-outline-danger rounded-pill" href="/auth/logout/">
            Logout
          </a>
          {% else %}
          <a class="btn btn-sm btn-outline-light rounded-pill" href="/auth/login/">
            Login
          </a>
          <a class="btn btn-sm btn-primary rounded-pill" href="/auth/register/">
            Register
          </a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid pt-5 mt-4 px-4 bg-black flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="container-fluid px-4 py-3 border-top border-secondary">
    <p class="text-secondary small mb-0">© {{ year|default:2026 }} HelpDesk</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>

</html>
